<!DOCTYPE html>
<html lang="en" style="background-color: #111;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
  <title>Homepage</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
</head>

<body>

  <video id="bg-video" autoplay muted loop playsinline>
    <source src="assets/background.mp4" type="video/mp4">
  </video>
  <img id="bg-image" alt="" style="display:none;">

  <div id="header">
    <p>
      <span id="greeting"></span><span id="cursor">_</span>
      <input type="text" id="cmd" autocomplete="off" spellcheck="false">
    </p>
    <div id="clock"></div>
  </div>

  <!-- Command output line -->
  <div id="cmd-output" class="cmd-output" style="display:none;"></div>

  <nav id="nav"></nav>

  <!-- Timer section -->
  <div id="timer-section" style="display:none;">
    <div id="timer-row">
      <span id="timer-label">timer</span>
      <span id="timer-display">00:00</span>
    </div>
    <div id="timer-bar-track">
      <div id="timer-bar-fill"></div>
    </div>
    <div id="timer-notif" style="display:none;">// timer complete</div>
  </div>

  <!-- Bookmarks manager overlay -->
  <div id="settings-overlay">
    <div id="settings-panel">

      <div id="settings-header">
        <span>// bookmarks</span>
        <span id="settings-hint">esc to close</span>
      </div>

      <div id="settings-body">

        <!-- Category list -->
        <div id="cat-list-section">
          <div class="section-label">folders</div>
          <div id="cat-list"></div>
          <div class="input-row" id="add-cat-row">
            <input type="text" id="new-cat-name" placeholder="folder name">
            <button class="action-btn" id="add-cat-btn">+ add</button>
          </div>
        </div>

        <!-- Link editor -->
        <div id="link-editor" class="hidden">
          <div class="section-label">
            <button id="back-btn">← back</button>
            <span id="editing-cat-name"></span>
          </div>
          <div id="link-list"></div>
          <div class="input-row">
            <input type="text" id="new-link-label" placeholder="label">
            <input type="text" id="new-link-url" placeholder="https://...">
            <button class="action-btn" id="add-link-btn">+ add</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- User settings overlay -->
  <div id="user-settings-overlay">
    <div id="user-settings-panel">

      <div id="settings-header">
        <span>// settings</span>
        <span id="settings-hint">esc to close</span>
      </div>

      <div id="settings-body">
        <div class="section-label">preferences</div>

        <div class="us-field">
          <label class="us-label">name</label>
          <input type="text" id="us-name" class="inline-input" placeholder="Jay">
        </div>

        <div class="us-field">
          <label class="us-label">background url <span class="us-hint">(image or .mp4)</span></label>
          <input type="text" id="us-bg" class="inline-input" placeholder="https://...">
        </div>

        <div class="input-row" style="margin-top:18px;">
          <button class="action-btn" id="us-save-btn">save</button>
          <button class="icon-btn" id="us-cancel-btn">cancel</button>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
